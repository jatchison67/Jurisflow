# ===================================
# JurisFlow Application Configuration
# ===================================

spring.application.name=JurisFlow

# Server
server.port=8080

# Console
spring.output.ansi.enabled=always

# ===================================
# Database Configuration
# ===================================

spring.datasource.url=jdbc:postgresql://localhost:5432/jurisflow

spring.datasource.username=jurisflow_app

spring.datasource.password=jurisflow_app


# ===================================
# JPA Configuration
# ===================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true


# ===================================
# Logging
# ===================================

logging.level.com.jurisflow=INFO

# ===================================
# Auth0
# ===================================
# JWT authentication is enabled by default. Deployed environments must set the
# issuer and audience below. For unauthenticated local work, activate the dev
# profile explicitly (SPRING_PROFILES_ACTIVE=dev).
auth0.enabled=${AUTH0_ENABLED:true}
auth0.issuer-uri=${AUTH0_ISSUER_URI:}
auth0.audience=${AUTH0_AUDIENCE:}
